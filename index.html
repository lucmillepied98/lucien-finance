<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:430px;margin:0 auto;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
button:active{opacity:.65}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}
.page{display:none}.page.on{display:block}
.tabs{display:flex;gap:6px;padding:0 16px 14px}
.tab{flex:1;padding:10px 4px;border-radius:12px;font-size:13px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);font-weight:400}
.tab.on{background:#2563EB;color:#fff;font-weight:700;border-color:transparent}
.card{background:#111;border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08)}
.er{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.er:last-child{border-bottom:none}
.ei{width:42px;height:42px;min-width:42px;border-radius:12px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px}
.en{flex:1;min-width:0}
.enm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ent{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.ea{font-size:15px;font-weight:700;white-space:nowrap}
.ed{background:rgba(255,255,255,.08);border-radius:8px;width:28px;min-width:28px;height:28px;color:rgba(255,255,255,.35);font-size:16px;display:flex;align-items:center;justify-content:center}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.st{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 6px;text-align:center}
.stl{font-size:9px;color:rgba(255,255,255,.35);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stv{font-size:14px;font-weight:700}
.bb{background:#1e1e1e;border-radius:100px;height:5px;margin:10px 0}
.bf{height:5px;border-radius:100px;transition:width .5s}
.sh{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
.shl{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.shr{font-size:12px;color:#60A5FA;font-weight:700}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.87);z-index:9999;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:#111;border-radius:20px 20px 0 0;padding:0 20px 48px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.1)}
.hdl{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:14px auto 20px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mtitle{font-size:17px;font-weight:700}
.xb{background:rgba(255,255,255,.1);border-radius:50%;width:32px;height:32px;color:rgba(255,255,255,.4);font-size:18px;display:flex;align-items:center;justify-content:center}
.inp{width:100%;background:#1a1a1a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 14px;color:#fff;font-size:15px;margin-bottom:8px;display:block;-webkit-appearance:none}
.inp::placeholder{color:rgba(255,255,255,.2)}
.r2{display:flex;gap:8px;margin-top:12px}
.bg2{flex:1;padding:13px;border-radius:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);font-size:14px;font-weight:500}
.bb2{flex:1;padding:13px;border-radius:12px;background:#2563EB;color:#fff;font-size:14px;font-weight:700}
.bg2n{flex:1;padding:13px;border-radius:12px;background:#10B981;color:#fff;font-size:14px;font-weight:700}
.bfull{width:100%;padding:13px;border-radius:12px;background:#2563EB;color:#fff;font-size:15px;font-weight:700;margin-top:4px;display:block}
.ig{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ib{width:40px;height:40px;border-radius:10px;background:#1a1a1a;border:2px solid transparent;font-size:19px;display:flex;align-items:center;justify-content:center}
.ib.on{border-color:#2563EB;background:rgba(59,130,246,.15)}

.prow{display:flex;gap:6px;margin:8px 0 16px}
.pb{flex:1;padding:10px;border-radius:10px;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-size:13px;font-weight:600}
.pb.on{background:rgba(59,130,246,.15);border-color:#2563EB;color:#60A5FA}

</style>
</head>

<div class="tabs">

  <div class="card">

    <div id="h-ws" style="font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1;color:#10B981">€ 0</div>

    <div class="bb"><div id="h-bar" class="bf" style="width:0%;background:#10B981"></div></div>

      <span id="h-st" style="color:#10B981">Im Budget</span>
      <span id="h-lf" style="color:rgba(255,255,255,.35)">€ 400 übrig</span>

      <div class="st"><div class="stl">Heute</div><div id="h-ts" class="stv">€ 0</div></div>

<script>
// ── ICONS ─────────────────────────────────────────────────────────────────────
var ICO = [
  ['cart','🛒'],['food','🍽️'],['coffee','☕'],['car','🚗'],['plane','✈️'],
  ['fun','🎭'],['shirt','👕'],['pill','💊'],['phone','📱'],['gift','🎁'],
  ['sport','⚽'],['beer','🍺'],['hotel','🏨'],['cinema','🎬'],['book','📚'],
  ['gym','💪'],['music','🎵'],['wrap','🌯'],['cake','🍰'],['scooter','🛴'],
  ['ticket','🎫'],['tax','🏦'],['shoe','👟'],['scissors','✂️'],['nail','💅'],
  ['cash','💵'],['barber','💈'],['beauty','🧴'],['bag','👜'],['market','🏪']
];
function gi(k){
  for(var i=0;i<ICO.length;i++){if(ICO[i][0]===k)return ICO[i][1];}
  return '💶';
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function lsGet(k,fb){
  try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}
}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── DATA ──────────────────────────────────────────────────────────────────────
function dAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split('T')[0];}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmt(n){
  return '€\u202f'+(+(n)).toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:2});
}

function makeSeed(){
  return [
    {id:1,  label:'Ticket Amsterdam',  amount:43,   date:dAgo(2),  icon:'ticket',   note:'Amsterdam'},
    {id:2,  label:'Burrito',           amount:25,   date:dAgo(2),  icon:'wrap',     note:'Amsterdam'},
    {id:3,  label:'Coffee Shop',       amount:26,   date:dAgo(2),  icon:'coffee',   note:'Amsterdam'},
    {id:4,  label:'Kuchen',            amount:5,    date:dAgo(2),  icon:'cake',     note:'Amsterdam'},
    {id:5,  label:'Tax Tourismus',     amount:28.5, date:dAgo(2),  icon:'tax',      note:'Amsterdam'},
    {id:6,  label:'Uber',              amount:23,   date:dAgo(2),  icon:'car',      note:'Amsterdam'},
    {id:7,  label:'The Sirens',        amount:160,  date:dAgo(2),  icon:'food',     note:'Geburtstag Verlobte 💍'},
    {id:8,  label:'Bolt',              amount:30,   date:dAgo(2),  icon:'scooter',  note:'Amsterdam'},
    {id:9,  label:'Supermarkt',        amount:85,   date:dAgo(6),  icon:'cart',     note:''},
    {id:10, label:'Friseur',           amount:35,   date:dAgo(11), icon:'scissors', note:''},
    {id:11, label:'Coffee',            amount:8,    date:dAgo(9),  icon:'coffee',   note:''},
    {id:12, label:'Kino',              amount:22,   date:dAgo(14), icon:'cinema',   note:''},
    {id:13, label:'Sport',             amount:40,   date:dAgo(8),  icon:'gym',      note:''},
    {id:14, label:'Supermarkt',        amount:62,   date:dAgo(13), icon:'cart',     note:''},
    {id:15, label:'Nägel',             amount:45,   date:dAgo(18), icon:'nail',     note:''}
  ];
}

var EXP = lsGet('kn10-exp', null);
if(!EXP || EXP.length === 0){ EXP = makeSeed(); lsSet('kn10-exp', EXP); }
var WB = lsGet('kn10-wb', 400);
var MB = lsGet('kn10-mb', 1500);
var SEL_ICON = 'cart';

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function isToday(d){return new Date(d).toDateString()===new Date().toDateString();}
function isWeek(d){
  var now=new Date(),dt=new Date(d),day=now.getDay()||7;
  var mon=new Date(now);mon.setDate(now.getDate()-day+1);mon.setHours(0,0,0,0);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return dt>=mon&&dt<=sun;
}
function isMonth(d){
  var n=new Date(),dt=new Date(d);
  return dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();
}
function scCol(p){return p<60?'#10B981':p<85?'#F59E0B':'#EF4444';}

function calcFc(){
  var now=new Date(),dom=now.getDate(),dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  var ms=EXP.filter(function(e){return isMonth(e.date);}).reduce(function(s,e){return s+e.amount;},0);
  var dr=dom>0?ms/dom:0,fore=dr*dim,diff=fore-MB,dl=dim-dom,bl=MB-ms;
  return{ms:ms,fore:fore,diff:diff,dom:dom,dim:dim,dl:dl,bl:bl,dr:dr,dleft:dl>0?bl/dl:0};
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calc(){
  var ws=0,ts=0,ms=0;
  EXP.forEach(function(e){
    if(isWeek(e.date))ws+=e.amount;
    if(isToday(e.date))ts+=e.amount;
    if(isMonth(e.date))ms+=e.amount;
  });
  return {ws:ws,ts:ts,ms:ms,wp:Math.min((ws/WB)*100,100)};
}

// ── DOM ───────────────────────────────────────────────────────────────────────
function g(id){return document.getElementById(id);}

function makeRow(e){
  var row=document.createElement('div');row.className='er';
  var ic=document.createElement('div');ic.className='ei';ic.textContent=gi(e.icon);
  var inf=document.createElement('div');inf.className='en';
  var nm=document.createElement('div');nm.className='enm';nm.textContent=e.label;
  var nt=document.createElement('div');nt.className='ent';
  nt.textContent=e.note||new Date(e.date).toLocaleDateString('de-DE',{day:'numeric',month:'short'});
  inf.appendChild(nm);inf.appendChild(nt);
  var am=document.createElement('div');am.className='ea';am.textContent=fmt(e.amount);
  var dl=document.createElement('button');dl.className='ed';dl.textContent='×';
  (function(eid){
    dl.addEventListener('click',function(ev){
      ev.stopPropagation();
      EXP=EXP.filter(function(x){return x.id!==eid;});
      lsSet('kn10-exp',EXP);
      draw();
    });
  })(e.id);
  row.appendChild(ic);row.appendChild(inf);row.appendChild(am);row.appendChild(dl);
  return row;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(){
  var st=calc(),sc=scCol(st.wp);
  g('sub').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});

  // Home
  g('h-ws').textContent=fmt(st.ws);g('h-ws').style.color=sc;
  g('h-of').textContent='von '+fmt(WB);
  g('h-bar').style.width=st.wp+'%';g('h-bar').style.background=sc;
  g('h-st').textContent=st.wp<60?'Im Budget':st.wp<85?'Aufpassen':'Fast erreicht';
  g('h-st').style.color=sc;
  g('h-lf').textContent=(WB-st.ws)>=0?fmt(WB-st.ws)+' übrig':fmt(Math.abs(WB-st.ws))+' überzogen';
  g('h-ts').textContent=fmt(st.ts);
  g('h-ws2').textContent=fmt(st.ws);g('h-ws2').style.color=sc;
  g('h-ms').textContent=fmt(st.ms);

  var rec=g('h-rec');rec.innerHTML='';
  if(EXP.length===0){
    var em=document.createElement('div');
    em.style.cssText='text-align:center;padding:18px 0;color:rgba(255,255,255,.3);font-size:13px';
    em.textContent='Noch keine Ausgaben · tippe +';
    rec.appendChild(em);
  } else {
    EXP.slice(0,6).forEach(function(e){rec.appendChild(makeRow(e));});
  }

  // All
  var tot=EXP.reduce(function(s,e){return s+e.amount;},0);
  g('all-t').textContent=fmt(tot);
  g('all-c').textContent=EXP.length+' Einträge';
  // Forecast
  var fc=calcFc();
  var fcCol=fc.diff>20?'#EF4444':fc.diff>-50?'#F59E0B':'#10B981';
  g('fc-big').textContent=fmt(fc.fore);g('fc-big').style.color=fcCol;
  g('fc-bud').textContent='Budget: '+fmt(MB);
  var bdg=g('fc-badge');
  bdg.textContent=fc.diff>20?'+'+fmt(fc.diff)+' Ueberschreitung':fc.diff>-50?'Knapp im Budget':'Gut · '+fmt(Math.abs(fc.diff))+' Spielraum';
  bdg.style.color=fcCol;
  bdg.style.background=fc.diff>20?'rgba(239,68,68,.12)':fc.diff>-50?'rgba(245,158,11,.12)':'rgba(16,185,129,.12)';
  g('fc-days').textContent='Tag '+fc.dom+' / '+fc.dim;
  g('fc-pct').textContent=Math.round((fc.ms/MB)*100)+'% verbraucht';
  g('fc-bar').style.width=Math.min((fc.ms/MB)*100,100)+'%';
  g('fc-sp').textContent=fmt(fc.ms);
  g('fc-dr').textContent=fmt(fc.dr);
  g('fc-bl').textContent=fmt(Math.max(fc.bl,0));g('fc-bl').style.color=fc.bl>0?'#10B981':'#EF4444';
  g('fc-dl').textContent=fmt(Math.max(fc.dleft,0));g('fc-dl').style.color=fc.dleft>30?'#10B981':fc.dleft>10?'#F59E0B':'#EF4444';
  g('mb-d').textContent=fmt(MB);

  var al=g('all-l');al.innerHTML='';
  if(EXP.length===0){
    var ae=document.createElement('div');
    ae.style.cssText='text-align:center;padding:24px 0;color:rgba(255,255,255,.3);font-size:13px';
    ae.textContent='Noch keine Ausgaben';al.appendChild(ae);return;
  }
  var grp={};
  EXP.forEach(function(e){if(!grp[e.date])grp[e.date]=[];grp[e.date].push(e);});
  var keys=Object.keys(grp).sort(function(a,b){return b.localeCompare(a);});
  var todD=todayStr(),yestD=new Date(Date.now()-86400000).toISOString().split('T')[0];
  keys.forEach(function(date,ki){
    var exps=grp[date],dt=exps.reduce(function(s,e){return s+e.amount;},0);
    var lbl=date===todD?'Heute':date===yestD?'Gestern':
      new Date(date).toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
    var sh=document.createElement('div');sh.className='sh';sh.style.marginTop=ki===0?'0':'18px';
    var sl=document.createElement('div');sl.className='shl';sl.textContent=lbl.toUpperCase();
    var sr=document.createElement('div');sr.className='shr';sr.textContent=fmt(dt);
    sh.appendChild(sl);sh.appendChild(sr);al.appendChild(sh);
    var cd=document.createElement('div');cd.className='card';cd.style.padding='8px 14px';
    exps.forEach(function(e){cd.appendChild(makeRow(e));});
    al.appendChild(cd);
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(id){
  ['home','forecast','all'].forEach(function(p){g(p).classList.remove('on');g('t-'+p).classList.remove('on');});
  g(id).classList.add('on');g('t-'+id).classList.add('on');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(title){
  g('m-t').textContent=title;
  g('m-b').innerHTML='';
  g('ov').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeModal(){
  g('ov').classList.remove('on');
  g('m-b').innerHTML='';
  document.body.style.overflow='';
}

// ── ADD ───────────────────────────────────────────────────────────────────────
function openAdd(){
  SEL_ICON='cart';
  openModal('Ausgabe hinzufügen');
  var body=g('m-b');

  // Icon grid
  var ig=document.createElement('div');ig.className='ig';
  ICO.forEach(function(ic){
    var b=document.createElement('button');
    b.className='ib'+(ic[0]==='cart'?' on':'');
    b.textContent=ic[1];
    (function(key,btn){
      btn.addEventListener('click',function(){
        SEL_ICON=key;
        document.querySelectorAll('.ib').forEach(function(x){x.classList.remove('on');});
        btn.classList.add('on');
      });
    })(ic[0],b);
    ig.appendChild(b);
  });
  body.appendChild(ig);

  // Fields
  var fields=[
    {id:'fl',type:'text',ph:'Bezeichnung'},
    {id:'fa',type:'number',ph:'Betrag (€)',inputmode:'decimal'},
    {id:'fd',type:'date',val:todayStr()},
    {id:'fn',type:'text',ph:'Notiz (optional)'}
  ];
  fields.forEach(function(f){
    var inp=document.createElement('input');
    inp.id=f.id;inp.type=f.type;inp.className='inp';
    if(f.ph)inp.placeholder=f.ph;
    if(f.val)inp.value=f.val;
    if(f.inputmode)inp.setAttribute('inputmode',f.inputmode);
    body.appendChild(inp);
  });

  var r2=document.createElement('div');r2.className='r2';
  var ca=document.createElement('button');ca.className='bg2';ca.textContent='Abbrechen';
  ca.addEventListener('click',closeModal);
  var sv=document.createElement('button');sv.className='bb2';sv.textContent='Speichern';
  sv.addEventListener('click',function(){
    var lbl=g('fl').value.trim();
    var amt=parseFloat(g('fa').value.replace(',','.'));
    var date=g('fd').value||todayStr();
    var note=g('fn').value.trim();
    if(!lbl||!amt||isNaN(amt))return;
    EXP.unshift({id:Date.now(),label:lbl,amount:amt,date:date,icon:SEL_ICON,note:note});
    lsSet('kn10-exp',EXP);
    closeModal();draw();
    g('sub').textContent='✓ Gespeichert';
    setTimeout(function(){
      g('sub').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    },1500);
  });
  r2.appendChild(ca);r2.appendChild(sv);
  body.appendChild(r2);
}

// ── BUDGET ────────────────────────────────────────────────────────────────────
function openBudgetMonth(){
  openModal('Monatsbudget');
  var body=g('m-b');
  var inp=document.createElement('input');
  inp.type='number';inp.className='inp';inp.setAttribute('inputmode','decimal');
  inp.style.cssText='font-size:28px;font-weight:800;text-align:center;color:#60A5FA;border-color:#2563EB;margin-bottom:8px';
  inp.value=MB;body.appendChild(inp);
  var pr=document.createElement('div');pr.className='prow';
  [1000,1200,1500,2000].forEach(function(pv){
    var b=document.createElement('button');b.className='pb'+(MB===pv?' on':'');b.textContent=pv;
    (function(val,btn){
      btn.addEventListener('click',function(){
        inp.value=val;
        document.querySelectorAll('.pb').forEach(function(x){x.classList.remove('on');});
        btn.classList.add('on');
      });
    })(pv,b);
    pr.appendChild(b);
  });
  body.appendChild(pr);
  var sv=document.createElement('button');sv.className='bfull';sv.textContent='Speichern';
  sv.addEventListener('click',function(){
    var v=parseFloat(inp.value)||1500;
    MB=v;lsSet('kn10-mb',v);
    closeModal();draw();
  });
  body.appendChild(sv);
}

function openBudget(){
  openModal('Wochenbudget');
  var body=g('m-b');

  var inp=document.createElement('input');
  inp.type='number';inp.className='inp';inp.setAttribute('inputmode','decimal');
  inp.style.cssText='font-size:28px;font-weight:800;text-align:center;color:#60A5FA;border-color:#2563EB;margin-bottom:8px';
  inp.value=WB;body.appendChild(inp);

  var pr=document.createElement('div');pr.className='prow';
  [200,300,400,500].forEach(function(pv){
    var b=document.createElement('button');b.className='pb'+(WB===pv?' on':'');b.textContent='€'+pv;
    (function(val,btn){
      btn.addEventListener('click',function(){
        inp.value=val;
        document.querySelectorAll('.pb').forEach(function(x){x.classList.remove('on');});
        btn.classList.add('on');
      });
    })(pv,b);
    pr.appendChild(b);
  });
  body.appendChild(pr);

  var sv=document.createElement('button');sv.className='bfull';sv.textContent='Speichern';
  sv.addEventListener('click',function(){
    var v=parseFloat(inp.value)||400;
    WB=v;lsSet('kn10-wb',v);
    closeModal();draw();
  });
  body.appendChild(sv);
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function shareApp(){
  var url = window.location.href;
  var text = 'Ich nutze Koinonia um meine Ausgaben zu tracken. Schau mal rein!';
  if(navigator.share){
    navigator.share({title:'Koinonia',text:text,url:url});
  } else {
    var ta=document.createElement('textarea');
    ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    g('sub').textContent='Link kopiert!';
    setTimeout(function(){
      g('sub').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    },2000);
  }
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
g('t-home').addEventListener('click',function(){showTab('home');});
g('t-forecast').addEventListener('click',function(){showTab('forecast');});
g('t-all').addEventListener('click',function(){showTab('all');});
g('btnAdd').addEventListener('click',openAdd);
g('btnAllShort').addEventListener('click',function(){showTab('all');});
g('btnWb').addEventListener('click',openBudget);
g('btnMb').addEventListener('click',openBudgetMonth);
g('m-x').addEventListener('click',closeModal);
g('ov').addEventListener('click',function(ev){if(ev.target===this)closeModal();});

// ── INIT ──────────────────────────────────────────────────────────────────────
draw();
</script>
