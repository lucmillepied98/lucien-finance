<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Koinonia">
<meta name="theme-color" content="#000">
<title>Koinonia v2</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:430px;margin:0 auto;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none;transition:opacity .15s}
button:active{opacity:.6}
input,textarea{font-family:inherit;outline:none;-webkit-appearance:none}
.page{display:none}.page.on{display:block}
.tabs{display:flex;gap:5px;padding:0 14px 12px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px;border-radius:11px;font-size:13px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08);font-weight:500}
.tab.on{background:#2563EB;color:#fff;font-weight:700;border-color:transparent}
.card{background:#111;border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08)}
.er{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.er:last-child{border-bottom:none}
.ei{width:40px;height:40px;min-width:40px;border-radius:11px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:18px}
.en{flex:1;min-width:0}
.enm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ent{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.ea{font-size:14px;font-weight:700;white-space:nowrap}
.edel{background:rgba(255,255,255,.08);border-radius:8px;width:26px;min-width:26px;height:26px;color:rgba(255,255,255,.35);font-size:15px;display:flex;align-items:center;justify-content:center}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:12px}
.st{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 6px;text-align:center}
.stl{font-size:9px;color:rgba(255,255,255,.35);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.stv{font-size:13px;font-weight:700}
.pbar{background:#1e1e1e;border-radius:100px;height:5px;margin:10px 0}
.pbfill{height:5px;border-radius:100px;transition:width .5s}
.sh{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
.shl{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.shr{font-size:12px;color:#60A5FA;font-weight:700}
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.87);z-index:9999;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:#111;border-radius:20px 20px 0 0;padding:0 20px 48px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-top:1px solid rgba(255,255,255,.1)}
.hdl{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.2);margin:14px auto 20px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mtitle{font-size:17px;font-weight:700}
.xbtn{background:rgba(255,255,255,.1);border-radius:50%;width:32px;height:32px;color:rgba(255,255,255,.5);font-size:18px;display:flex;align-items:center;justify-content:center}
.inp{width:100%;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 14px;color:#fff;font-size:15px;margin-bottom:8px;display:block}
.inp::placeholder{color:rgba(255,255,255,.2)}
.r2{display:flex;gap:8px;margin-top:12px}
.btn-gray{flex:1;padding:13px;border-radius:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:14px;font-weight:500}
.btn-blue{flex:1;padding:13px;border-radius:12px;background:#2563EB;color:#fff;font-size:14px;font-weight:700}
.btn-green{flex:1;padding:13px;border-radius:12px;background:#10B981;color:#fff;font-size:14px;font-weight:700}
.btn-red{flex:1;padding:13px;border-radius:12px;background:#EF4444;color:#fff;font-size:14px;font-weight:700}
.btn-full{width:100%;padding:13px;border-radius:12px;background:#2563EB;color:#fff;font-size:15px;font-weight:700;margin-top:4px}
.igrid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ibtn{width:40px;height:40px;border-radius:10px;background:#1a1a1a;border:2px solid transparent;font-size:19px;display:flex;align-items:center;justify-content:center}
.presets{display:flex;gap:6px;margin:8px 0 16px}
.preset{flex:1;padding:10px;border-radius:10px;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.35);font-size:13px;font-weight:600}
.preset.on{background:rgba(59,130,246,.15);border-color:#2563EB;color:#60A5FA}
.badge{display:inline-block;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700}
.ins-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ins-row:last-child{border-bottom:none}
.mood-bar{display:flex;justify-content:space-between;gap:6px;margin:14px 0}
.mood-btn{flex:1;padding:10px 2px;border-radius:12px;background:#1a1a1a;border:2px solid transparent;text-align:center}
.mood-btn.on{border-color:#2563EB;background:rgba(59,130,246,.15)}
.sel-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.sel-row:last-child{border-bottom:none}
.sel-chk{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.sel-chk.on{background:#2563EB;border-color:#2563EB;color:#fff}
</style>
</head>
