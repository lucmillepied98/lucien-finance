<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Koinonia PWA" />
  <meta name="theme-color" content="#000000" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Koinonia" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Koinonia" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />

  <title>Koinonia</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .app {
      padding: 24px 16px 80px;
    }

    .card {
      background: #111;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      color: #fff;
      background: #2563EB;
      cursor: pointer;
    }

    .btn.secondary {
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.8);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, button, textarea {
      font: inherit;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding: 12px 14px;
      color: #fff;
      outline: none;
      margin-bottom: 10px;
    }

    .muted {
      color: rgba(255,255,255,.45);
      font-size: 13px;
    }

    .install {
      display: none;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 style="margin:0 0 8px;">Koinonia</h1>
    <div class="muted" id="status">PWA bereit</div>

    <div class="card install" id="installBox">
      <div style="margin-bottom:10px;">App installieren</div>
      <div class="row">
        <button class="btn" id="btnInstall">Installieren</button>
        <button class="btn secondary" id="btnCloseInstall">Später</button>
      </div>
    </div>

    <div class="card">
      <input id="title" placeholder="Titel" />
      <input id="amount" type="number" step="0.01" placeholder="Betrag" />
      <button class="btn" style="width:100%;" id="saveBtn">Speichern</button>
    </div>

    <div class="card" id="list">
      <div class="muted">Noch keine Einträge.</div>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(console.error);
      });
    }

    let deferredPrompt = null;
    const installBox = document.getElementById("installBox");
    const btnInstall = document.getElementById("btnInstall");
    const btnCloseInstall = document.getElementById("btnCloseInstall");
    const status = document.getElementById("status");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBox.style.display = "block";
      status.textContent = "Installation verfügbar";
    });

    btnInstall.addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBox.style.display = "none";
      status.textContent = "Installationsdialog geschlossen";
    });

    btnCloseInstall.addEventListener("click", () => {
      installBox.style.display = "none";
    });

    const entries = JSON.parse(localStorage.getItem("entries") || "[]");
    const list = document.getElementById("list");
    const title = document.getElementById("title");
    const amount = document.getElementById("amount");
    const saveBtn = document.getElementById("saveBtn");

    function render() {
      list.innerHTML = "";
      if (!entries.length) {
        list.innerHTML = '<div class="muted">Noch keine Einträge.</div>';
        return;
      }
      entries.slice().reverse().forEach((item) => {
        const div = document.createElement("div");
        div.style.padding = "10px 0";
        div.style.borderBottom = "1px solid rgba(255,255,255,.06)";
        div.innerHTML = `<strong>${item.title}</strong><br><span class="muted">${item.amount} €</span>`;
        list.appendChild(div);
      });
    }

    saveBtn.addEventListener("click", () => {
      const t = title.value.trim();
      const a = Number(amount.value);
      if (!t || !a) return;
      entries.push({ title: t, amount: a });
      localStorage.setItem("entries", JSON.stringify(entries));
      title.value = "";
      amount.value = "";
      render();
    });

    render();
  </script>
</body>
</html>
