function gi(k){
  for(var i=0;i<ICONS.length;i++){
    if(ICONS[i][0]===k)return ICONS[i][1];
  }
  return '💶';
}

  ['uber','car'],['bolt','scooter'],['taxi','car'],['bahn','car'],['bus','car'],
  ['flug','plane'],['ticket','ticket'],['cafe','coffee'],['coffee','coffee'],['kaffee','coffee'],
  ['restaurant','food'],['essen','food'],['burger','food'],['pizza','food'],['sushi','food'],

  ['geschenk','gift'],['kirche','gift'],['spende','gift'],['museum','fun'],['konzert','music'],
  ['theater','fun']
];

function autoEmoji(l){
  var s=l.toLowerCase();
  for(var i=0;i<RULES.length;i++){
    if(s.indexOf(RULES[i][0])!==-1)return RULES[i][1];
  }
  return null;
}

function lsGet(k,fb){
  try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}
}
function lsSet(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
}

var EXP=lsGet('kn11-exp',[]);
var WB=lsGet('kn11-wb',400);
var MB=lsGet('kn11-mb',1500);
var TRIPS=lsGet('kn11-trips',[]);
var GROUPS=lsGet('kn11-groups',[]);
var SICON='cart';
var SP_N=2;
var SP_PEOPLE=[];
var SELECTED={};

function fmt(n){
  return '€ '+Number(n).toLocaleString('de-DE',{
    minimumFractionDigits:0,
    maximumFractionDigits:2
  });
}

function today(){
  return new Date().toISOString().split('T')[0];
}
function isToday(d){
  return new Date(d).toDateString()===new Date().toDateString();
}
function isWeek(d){
  var now=new Date(),
      dt=new Date(d),
      day=now.getDay()||7;

  var mon=new Date(now);
  mon.setDate(now.getDate()-day+1);
  mon.setHours(0,0,0,0);

  var sun=new Date(mon);
  sun.setDate(mon.getDate()+6);
  sun.setHours(23,59,59,999);

  return dt>=mon && dt<=sun;
}
function isMonth(d){
  var n=new Date(),
      dt=new Date(d);
  return dt.getMonth()===n.getMonth() && dt.getFullYear()===n.getFullYear();
}
function scCol(p){
  return p<60?'#10B981':p<85?'#F59E0B':'#EF4444';
}
function g(id){
  return document.getElementById(id);
}
function el(tag){
  return document.createElement(tag);
}

function calcHome(){
  var ws=0,ts=0,ms=0;
  EXP.forEach(function(e){
    if(isWeek(e.date))ws+=e.amount;
    if(isToday(e.date))ts+=e.amount;
    if(isMonth(e.date))ms+=e.amount;
  });
  return{
    ws:ws,ts:ts,ms:ms,
    wp:Math.min((ws/WB)*100,100)
  };
}

function calcFc(){
  var now=new Date(),
      dom=now.getDate(),
      dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

  var ms=EXP.filter(function(e){return isMonth(e.date);})
            .reduce(function(s,e){return s+e.amount;},0);

  var dr=dom>0?ms/dom:0,
      fore=dr*dim,
      bl=MB-ms,
      dl=dim-dom;

  return{
    ms:ms,fore:fore,diff:fore-MB,
    dom:dom,dim:dim,dr:dr,bl:bl,dleft:dl>0?bl/dl:0
  };
}

function makeRow(e){
  var row=el('div');
  row.className='er';

  var ic=el('div');
  ic.className='ei';
  ic.textContent=gi(e.icon);

  var inf=el('div');
  inf.className='en';

  var nm=el('div');
  nm.className='enm';
  nm.textContent=e.label;

  var nt=el('div');
  nt.className='ent';
  var moodMap={great:' 😄',good:' 🙂',ok:' 😐',meh:' 😕',bad:' 😟'};
  nt.textContent=(e.note||new Date(e.date).toLocaleDateString('de-DE',{
    day:'numeric',
    month:'short'
  }))+(e.mood?moodMap[e.mood]||'':'');

  inf.appendChild(nm);
  inf.appendChild(nt);

  var am=el('div');
  am.className='ea';
  am.textContent=fmt(e.amount);

  var sp=el('button');
  sp.style.cssText='background:rgba(59,130,246,.15);border-radius:8px;width:26px;min-width:26px;height:26px;color:#60A5FA;font-size:11px;display:flex;align-items:center;justify-content:center;margin-left:2px';
  sp.textContent='%';
  (function(exp){
    sp.addEventListener('click',function(ev){
      ev.stopPropagation();
      g('sp-amt').value=exp.amount;
      g('sp-desc').value=exp.label;
      SP_N=2;
      SP_PEOPLE=[{name:'',amount:0,locked:false},{name:'',amount:0,locked:false}];
      buildNamesArea();
      showTab('split');
    });
  })(e);

  var dl=el('button');
  dl.className='edel';
  dl.textContent='×';
  (function(eid){
    dl.addEventListener('click',function(ev){
      ev.stopPropagation();
      EXP=EXP.filter(function(x){return x.id!==eid;});
      lsSet('kn11-exp',EXP);
      draw();
    });
  })(e.id);

  row.appendChild(ic);
  row.appendChild(inf);
  row.appendChild(am);
  row.appendChild(sp);
  row.appendChild(dl);

  return row;
}

function draw(){
  var st=calcHome();
  var sc=scCol(st.wp);

  g('sub').textContent=new Date().toLocaleDateString('de-DE',{
    weekday:'long',day:'numeric',month:'long',year:'numeric'
  });

  g('h-ws').textContent=fmt(st.ws);
  g('h-ws').style.color=sc;

  g('h-of').textContent='von '+fmt(WB);

  g('h-bar').style.width=st.wp+'%';
  g('h-bar').style.background=sc;

  g('h-st').textContent=st.wp<60?'Im Budget':st.wp<85?'Aufpassen':'Fast voll';
  g('h-st').style.color=sc;

  var lft=WB-st.ws;
  g('h-lf').textContent=lft>=0?fmt(lft)+' uebrig':fmt(Math.abs(lft))+' ueberzogen';

  g('h-ts').textContent=fmt(st.ts);
  g('h-ws2').textContent=fmt(st.ws);
  g('h-ws2').style.color=sc;
  g('h-ms').textContent=fmt(st.ms);

  drawInsights(st);

  var rec=g('h-rec');
  rec.innerHTML='';
  if(EXP.length===0){
    var em=el('div');
    em.style.cssText='text-align:center;padding:18px 0;color:rgba(255,255,255,.3);font-size:13px';
    em.textContent='Noch keine Ausgaben';
    rec.appendChild(em);
  }else{
    EXP.slice(0,6).forEach(function(e){
      rec.appendChild(makeRow(e));
    });
  }

  var fc=calcFc();
  var fcCol=fc.diff>20?'#EF4444':fc.diff>-50?'#F59E0B':'#10B981';

  g('fc-big').textContent=fmt(fc.fore);
  g('fc-big').style.color=fcCol;

  g('fc-bud').textContent='Budget: '+fmt(MB);

  var bdg=g('fc-badge');
  if(fc.diff>20){
    bdg.textContent='+'+fmt(fc.diff)+' ueber Budget';
    bdg.style.color='#EF4444';
    bdg.style.background='rgba(239,68,68,.12)';
  }else if(fc.diff>-50){
    bdg.textContent='Knapp im Budget';
    bdg.style.color='#F59E0B';
    bdg.style.background='rgba(245,158,11,.12)';
  }else{
    bdg.textContent='Gut - '+fmt(Math.abs(fc.diff))+' Spielraum';
    bdg.style.color='#10B981';
    bdg.style.background='rgba(16,185,129,.12)';
  }

  g('fc-days').textContent='Tag '+fc.dom+' / '+fc.dim;
  g('fc-pct').textContent=Math.round((fc.ms/MB)*100)+'% verbraucht';
  g('fc-bar').style.width=Math.min((fc.ms/MB)*100,100)+'%';

  g('fc-sp').textContent=fmt(fc.ms);
  g('fc-dr').textContent=fmt(fc.dr);
  g('fc-bl').textContent=fmt(Math.max(fc.bl,0));
  g('fc-bl').style.color=fc.bl>0?'#10B981':'#EF4444';
  g('fc-dl').textContent=fmt(Math.max(fc.dleft,0));
  g('fc-dl').style.color=fc.dleft>30?'#10B981':fc.dleft>10?'#F59E0B':'#EF4444';

  g('mb-d').textContent=fmt(MB);

  var tot=EXP.reduce(function(s,e){return s+e.amount;},0);
  g('all-t').textContent=fmt(tot);
  g('all-c').textContent=EXP.length+' Eintraege';

  var al=g('all-l');
  al.innerHTML='';
  if(EXP.length===0){
    var ae=el('div');
    ae.style.cssText='text-align:center;padding:24px 0;color:rgba(255,255,255,.3);font-size:13px';
    ae.textContent='Noch keine Ausgaben';
    al.appendChild(ae);
  }else{
    var grp={};
    EXP.forEach(function(e){
      if(!grp[e.date])grp[e.date]=[];
      grp[e.date].push(e);
    });
    var keys=Object.keys(grp).sort(function(a,b){return b.localeCompare(a);});
    var todD=today(),yestD=new Date(Date.now()-86400000).toISOString().split('T')[0];

    keys.forEach(function(date,ki){
      var exps=grp[date],
          dt=exps.reduce(function(s,e){return s+e.amount;},0);

      var lbl=date===todD?'HEUTE':
              date===yestD?'GESTERN':
              new Date(date).toLocaleDateString('de-DE',{
                weekday:'short',day:'numeric',month:'short'
              }).toUpperCase();

      var sh=el('div');
      sh.className='sh';
      sh.style.marginTop=ki===0?'0':'16px';

      var sl=el('div');
      sl.className='shl';
      sl.textContent=lbl;

      var sr=el('div');
      sr.className='shr';
      sr.textContent=fmt(dt);

      sh.appendChild(sl);
      sh.appendChild(sr);
      al.appendChild(sh);

      var cd=el('div');
      cd.className='card';
      cd.style.padding='8px 14px';

      exps.forEach(function(e){
        cd.appendChild(makeRow(e));
      });
      al.appendChild(cd);
    });
