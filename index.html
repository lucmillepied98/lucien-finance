// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function isToday(d){return new Date(d).toDateString()===new Date().toDateString();}
function isWeek(d){
  var now=new Date(),dt=new Date(d),day=now.getDay()||7;
  var mon=new Date(now);mon.setDate(now.getDate()-day+1);mon.setHours(0,0,0,0);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return dt>=mon&&dt<=sun;
}
function isMonth(d){
  var n=new Date(),dt=new Date(d);
  return dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();
}
function scCol(p){return p<60?'#10B981':p<85?'#F59E0B':'#EF4444';}

function calcFc(){
  var now=new Date(),dom=now.getDate(),dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  var ms=EXP.filter(function(e){return isMonth(e.date);}).reduce(function(s,e){return s+e.amount;},0);
  var dr=dom>0?ms/dom:0,fore=dr*dim,diff=fore-MB,dl=dim-dom,bl=MB-ms;
  return{ms:ms,fore:fore,diff:diff,dom:dom,dim:dim,dl:dl,bl:bl,dr:dr,dleft:dl>0?bl/dl:0};
}

// ── CALC ──────────────────────────────────────────────────────────────────────
function calc(){
  var ws=0,ts=0,ms=0;
  EXP.forEach(function(e){
    if(isWeek(e.date))ws+=e.amount;
    if(isToday(e.date))ts+=e.amount;
    if(isMonth(e.date))ms+=e.amount;
  });
  return {ws:ws,ts:ts,ms:ms,wp:Math.min((ws/WB)*100,100)};
}

function g(id){return document.getElementById(id);}

function makeRow(e){

      draw();
    });
  })(e.id);
  row.appendChild(ic);row.appendChild(inf);row.appendChild(am);row.appendChild(dl);
  return row;
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw(){
  var st=calc(),sc=scCol(st.wp);
  g('sub').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});

  // Home
  g('h-ws').textContent=fmt(st.ws);g('h-ws').style.color=sc;
  g('h-of').textContent='von '+fmt(WB);
  g('h-bar').style.width=st.wp+'%';g('h-bar').style.background=sc;
  g('h-st').textContent=st.wp<60?'Im Budget':st.wp<85?'Aufpassen':'Fast erreicht';
  g('h-st').style.color=sc;
  g('h-lf').textContent=(WB-st.ws)>=0?fmt(WB-st.ws)+' übrig':fmt(Math.abs(WB-st.ws))+' überzogen';
  g('h-ts').textContent=fmt(st.ts);
  g('h-ws2').textContent=fmt(st.ws);g('h-ws2').style.color=sc;
  g('h-ms').textContent=fmt(st.ms);

  // ── SMART INSIGHTS ──
  var st2 = calc();
  var wc = weekComparison();
  var df = dayForecast();
  var insBody = g('insights-body');
  insBody.innerHTML = '';
  var insights = [];

  // 1. Biggest spending label
  var labelTotals = {};
  EXP.forEach(function(e){
    var k = e.label;
    if(!labelTotals[k]) labelTotals[k] = {label:e.label,icon:e.icon,total:0};
    labelTotals[k].total += e.amount;
  });
  var sorted = Object.values(labelTotals).sort(function(a,b){return b.total-a.total;});
  if(sorted.length > 0){
    insights.push({
      emoji:'🔥',
      text:'Größter Posten: '+sorted[0].icon+' '+sorted[0].label,
      val:fmt(sorted[0].total),
      col:'#EF4444'
    });
  }

  // 2. Most expensive day of week
  var byDay = {};
  var dayNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  EXP.forEach(function(e){
    var wd = new Date(e.date).getDay();
    if(!byDay[wd]) byDay[wd] = 0;
    byDay[wd] += e.amount;
  });
  var maxDay = -1, maxDayAmt = 0;
  Object.keys(byDay).forEach(function(d){if(byDay[d]>maxDayAmt){maxDayAmt=byDay[d];maxDay=+d;}});
  if(maxDay >= 0){
    insights.push({
      emoji:'📅',
      text:'Teuerster Wochentag: '+dayNames[maxDay],
      val:fmt(maxDayAmt),
      col:'#F59E0B'
    });
  }

  // 3. Week comparison
  if(wc.lastWeek > 0){
    var wdiff = wc.diff;
    insights.push({
      emoji: wdiff > 0 ? '⬆️' : '⬇️',
      text: wdiff > 0 ? 'Mehr als letzte Woche' : 'Weniger als letzte Woche',
      val: fmt(Math.abs(wdiff)),
      col: wdiff > 0 ? '#EF4444' : '#10B981'
    });
  }

  // 4. How many days budget lasts
  if(st2.ws > 0 && WB > 0){
    var dailyRate = st2.ws / 7;
    var daysLeft = Math.max(0, Math.floor((WB - st2.ws) / dailyRate));
    if(daysLeft > 0 && daysLeft < 14){
      insights.push({
        emoji:'⏳',
        text:'Budget reicht noch ca.',
        val:daysLeft+' Tage',
        col:'#60A5FA'
      });
    }
  }

  // 5. Recurring pattern
  var rec2 = findRecurring();
  if(rec2.length > 0 && rec2[0].times >= 3){
    insights.push({
      emoji:'🔄',
      text:rec2[0].label+' ('+rec2[0].times+'x wiederholt)',
      val:'Ø '+fmt(rec2[0].avg),
      col:'rgba(255,255,255,.5)'
    });
  }

  insights.forEach(function(ins){
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)';
    var left = document.createElement('div');
    left.style.cssText = 'font-size:13px;color:rgba(255,255,255,.65)';
    left.textContent = ins.emoji+' '+ins.text;
    var right = document.createElement('div');
    right.style.cssText = 'font-size:13px;font-weight:700;color:'+ins.col;
    right.textContent = ins.val;
    row.appendChild(left);row.appendChild(right);
    insBody.appendChild(row);
  });

  g('insights-card').style.display = insights.length > 0 ? 'block' : 'none';

  var rec=g('h-rec');rec.innerHTML='';
  var df = dayForecast();
  var rec2 = findRecurring();
  var insBody = g('insights-body');
  insBody.innerHTML = '';
  var hasInsight = false;

  // Week comparison
  if(wc.lastWeek > 0){
    hasInsight = true;
    var wi = document.createElement('div');
    wi.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
    var wdiff = wc.diff;
    var wicon = wdiff > 0 ? '⬆' : '⬇';
    var wcol = wdiff > 0 ? '#EF4444' : '#10B981';
    wi.innerHTML = '<div style="font-size:13px;color:rgba(255,255,255,.7)">Diese vs. letzte Woche</div>'
      +'<div style="font-size:13px;font-weight:700;color:'+wcol+'">'+wicon+' '+fmt(Math.abs(wdiff))+'</div>';
    insBody.appendChild(wi);
  }

  // Day forecast
  if(df !== null){
    hasInsight = true;
    var di = document.createElement('div');
    di.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
    var days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
    di.innerHTML = '<div style="font-size:13px;color:rgba(255,255,255,.7)">Typ. Ausgabe '+days[new Date().getDay()]+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:#60A5FA">'+fmt(df)+'</div>';
    insBody.appendChild(di);
  }

  // Recurring
  if(rec2.length > 0){
    hasInsight = true;
    var ri = document.createElement('div');
    ri.style.cssText = 'margin-top:4px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)';
    ri.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Oft wiederholt</div>';
    rec2.forEach(function(r){
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px';
      row.innerHTML = '<div style="font-size:13px;color:rgba(255,255,255,.6)">'+r.icon+' '+r.label+' ('+r.times+'x)</div>'
        +'<div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.5)">Ø '+fmt(r.avg)+'</div>';
      ri.appendChild(row);
    });
    insBody.appendChild(ri);
  }

  g('insights-card').style.display = hasInsight ? 'block' : 'none';

  var rec=g('h-rec');rec.innerHTML='';
  if(EXP.length===0){
    var em=document.createElement('div');
    em.style.cssText='text-align:center;padding:18px 0;color:rgba(255,255,255,.3);font-size:13px';
    em.textContent='Noch keine Ausgaben · tippe +';
    rec.appendChild(em);
  } else {
    EXP.slice(0,6).forEach(function(e){rec.appendChild(makeRow(e));});
  }

  // All
  var tot=EXP.reduce(function(s,e){return s+e.amount;},0);
  g('all-t').textContent=fmt(tot);
  g('all-c').textContent=EXP.length+' Einträge';
  // Forecast
  var fc=calcFc();
  var fcCol=fc.diff>20?'#EF4444':fc.diff>-50?'#F59E0B':'#10B981';
  g('fc-big').textContent=fmt(fc.fore);g('fc-big').style.color=fcCol;
  g('fc-bud').textContent='Budget: '+fmt(MB);
  var bdg=g('fc-badge');
  bdg.textContent=fc.diff>20?'+'+fmt(fc.diff)+' Ueberschreitung':fc.diff>-50?'Knapp im Budget':'Gut · '+fmt(Math.abs(fc.diff))+' Spielraum';
  bdg.style.color=fcCol;
  bdg.style.background=fc.diff>20?'rgba(239,68,68,.12)':fc.diff>-50?'rgba(245,158,11,.12)':'rgba(16,185,129,.12)';
  g('fc-days').textContent='Tag '+fc.dom+' / '+fc.dim;
  g('fc-pct').textContent=Math.round((fc.ms/MB)*100)+'% verbraucht';
  g('fc-bar').style.width=Math.min((fc.ms/MB)*100,100)+'%';
  g('fc-sp').textContent=fmt(fc.ms);
  g('fc-dr').textContent=fmt(fc.dr);
  g('fc-bl').textContent=fmt(Math.max(fc.bl,0));g('fc-bl').style.color=fc.bl>0?'#10B981':'#EF4444';
  g('fc-dl').textContent=fmt(Math.max(fc.dleft,0));g('fc-dl').style.color=fc.dleft>30?'#10B981':fc.dleft>10?'#F59E0B':'#EF4444';
  g('mb-d').textContent=fmt(MB);

  var al=g('all-l');al.innerHTML='';
  if(EXP.length===0){
    var ae=document.createElement('div');
    ae.style.cssText='text-align:center;padding:24px 0;color:rgba(255,255,255,.3);font-size:13px';
    ae.textContent='Noch keine Ausgaben';al.appendChild(ae);return;
  }
  var grp={};
  EXP.forEach(function(e){if(!grp[e.date])grp[e.date]=[];grp[e.date].push(e);});
  var keys=Object.keys(grp).sort(function(a,b){return b.localeCompare(a);});
  var todD=todayStr(),yestD=new Date(Date.now()-86400000).toISOString().split('T')[0];
  keys.forEach(function(date,ki){
    var exps=grp[date],dt=exps.reduce(function(s,e){return s+e.amount;},0);
    var lbl=date===todD?'Heute':date===yestD?'Gestern':
      new Date(date).toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});
    var sh=document.createElement('div');sh.className='sh';sh.style.marginTop=ki===0?'0':'18px';
    var sl=document.createElement('div');sl.className='shl';sl.textContent=lbl.toUpperCase();
    var sr=document.createElement('div');sr.className='shr';sr.textContent=fmt(dt);
    sh.appendChild(sl);sh.appendChild(sr);al.appendChild(sh);
    var cd=document.createElement('div');cd.className='card';cd.style.padding='8px 14px';
    exps.forEach(function(e){cd.appendChild(makeRow(e));});
    al.appendChild(cd);
  });
}

// ── PREDICTIVE FEATURES (ohne KI) ────────────────────────────────────────────

// Erkennt wiederkehrende Ausgaben (gleicher Label, ähnlicher Betrag, mehrmals)
function findRecurring(){
  var counts = {};
  EXP.forEach(function(e){
    var key = e.label.toLowerCase().trim();
    if(!counts[key]) counts[key] = {label:e.label, icon:e.icon, times:0, avg:0, total:0};
    counts[key].times++;
    counts[key].total += e.amount;
  });
  var recurring = [];
  Object.keys(counts).forEach(function(k){
    if(counts[k].times >= 2){
      counts[k].avg = Math.round(counts[k].total / counts[k].times * 100) / 100;
      recurring.push(counts[k]);
    }
  });
  return recurring.sort(function(a,b){return b.times-a.times;}).slice(0,3);
}

// Berechnet Sparquote diese Woche vs letzte Woche
function weekComparison(){
  var now = new Date(), day = now.getDay()||7;
  var thisMon = new Date(now); thisMon.setDate(now.getDate()-day+1); thisMon.setHours(0,0,0,0);
  var lastMon = new Date(thisMon); lastMon.setDate(thisMon.getDate()-7);
  var lastSun = new Date(thisMon); lastSun.setSeconds(-1);
  var thisWeek = EXP.filter(function(e){return new Date(e.date)>=thisMon;}).reduce(function(s,e){return s+e.amount;},0);
  var lastWeek = EXP.filter(function(e){var d=new Date(e.date);return d>=lastMon&&d<=lastSun;}).reduce(function(s,e){return s+e.amount;},0);
  return {thisWeek:thisWeek, lastWeek:lastWeek, diff:thisWeek-lastWeek};
}

// Tagesprognose: Basierend auf Wochentag-Durchschnitt
function dayForecast(){
  var now = new Date(), todayDay = now.getDay();
  var byDay = {};
  EXP.forEach(function(e){
    var d = new Date(e.date), wd = d.getDay();
    if(!byDay[wd]) byDay[wd] = {total:0,count:0};
    byDay[wd].total += e.amount;
    byDay[wd].count++;
  });
  if(byDay[todayDay] && byDay[todayDay].count > 0){
    return Math.round(byDay[todayDay].total / byDay[todayDay].count * 100) / 100;
  }
  return null;
}

function openAdd(){
  SEL_ICON='cart';

  // Icon grid
  var ig=document.createElement('div');ig.className='ig';

          SEL_ICON=auto;
          document.querySelectorAll('.ib').forEach(function(x){x.classList.remove('on');});

  });

  var r2=document.createElement('div');r2.className='r2';

    EXP.unshift({id:Date.now(),label:lbl,amount:amt,date:date,icon:SEL_ICON,note:note});

      g('sub').textContent=new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    },1500);
  });
  r2.appendChild(ca);r2.appendChild(sv);
  body.appendChild(r2);
}
