<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ausgaben">
  <meta name="theme-color" content="#0A0A0A">
  <title>Lucien · Ausgaben</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0A0A0A; color: #CCCCCC; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 0 auto; min-height: 100vh; }
    @keyframes pulse { 0%,100%{opacity:0.4;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
    @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .slide-in { animation: slideIn 0.3s ease; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const INITIAL = [
  { id:1,  label:"Ticket Amsterdam",  amount:43,   date:"2026-03-26", icon:"🎟️", note:"Amsterdam Trip" },
  { id:2,  label:"Essen Burrito",     amount:25,   date:"2026-03-26", icon:"🌯", note:"Amsterdam" },
  { id:3,  label:"Coffee Shop",       amount:26,   date:"2026-03-26", icon:"☕", note:"Amsterdam" },
  { id:4,  label:"Kuchen",            amount:5,    date:"2026-03-26", icon:"🍰", note:"Amsterdam" },
  { id:5,  label:"Tax Tourismus",     amount:28.5, date:"2026-03-26", icon:"🏛️", note:"Amsterdam" },
  { id:6,  label:"Uber",              amount:23,   date:"2026-03-26", icon:"🚗", note:"Amsterdam" },
  { id:7,  label:"The Sirens Fine Dining", amount:160, date:"2026-03-26", icon:"🍽️", note:"Geburtstag Verlobte 💍" },
  { id:8,  label:"Bolt",              amount:30,   date:"2026-03-26", icon:"🛴", note:"Amsterdam" },
  { id:9,  label:"Lebensmittel",      amount:85,   date:"2026-03-22", icon:"🛒", note:"" },
  { id:10, label:"Sport Supplement",  amount:40,   date:"2026-03-20", icon:"💪", note:"" },
];

const ICONS = ["🛒","🍽️","☕","🚗","✈️","🎭","👕","💊","📱","🎮","🎁","💇","⚽","🍺","🏨","⛽","🎬","📚","💪","🎵","🌯","🍰","🛴","🎟️","🏛️","👟","🎸","🌿"];

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadData(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function saveData(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  expenses: loadData("lf-expenses-v2", INITIAL),
  weekBudget: loadData("lf-budget-v2", 400),
  tab: "heute",
  modal: null, // null | "scan" | "add" | "budget"
  scanStep: "input", // input | scanning | confirm
  scanText: "",
  scanResults: [],
  addForm: { label:"", amount:"", date: new Date().toISOString().split("T")[0], icon:"🛒", note:"" },
  budgetInput: "400",
  aiMsg: "",
  aiLoading: false,
  savedFlash: false,
};

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

function saveExpenses() {
  saveData("lf-expenses-v2", state.expenses);
  setState({ savedFlash: true });
  setTimeout(() => setState({ savedFlash: false }), 1500);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(n) { return "€ " + Number(n).toLocaleString("de-DE", { minimumFractionDigits:0, maximumFractionDigits:2 }); }

function isToday(d) {
  const now = new Date(), date = new Date(d);
  return date.toDateString() === now.toDateString();
}
function isThisWeek(d) {
  const now = new Date(), date = new Date(d);
  const day = now.getDay() || 7;
  const mon = new Date(now); mon.setDate(now.getDate() - day + 1); mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return date >= mon && date <= sun;
}

function getDisplayExp() {
  if (state.tab === "heute") return state.expenses.filter(e => isToday(e.date));
  if (state.tab === "woche") return state.expenses.filter(e => isThisWeek(e.date));
  return state.expenses;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function addExpense(e) {
  state.expenses = [{ ...e, id: Date.now() + Math.random() }, ...state.expenses];
  saveExpenses();
}

function deleteExpense(id) {
  state.expenses = state.expenses.filter(x => x.id !== id);
  saveExpenses();
}

async function scanWithAI(text) {
  setState({ scanStep: "scanning" });
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `Ausgaben-Parser. Extrahiere alle Ausgaben aus Text/Notizen. Gib NUR JSON zurück ohne Markdown oder Backticks.
Format: [{"label":"Name","amount":12.50,"icon":"emoji","date":"YYYY-MM-DD"}]
Emoji-Regeln: 🍽️ Restaurant/Essen gehen, 🌯 Fast Food, ☕ Café/Kaffee, 🚗 Uber/Taxi, 🛴 Bolt/Scooter, ✈️ Flug/Ticket/Transport, 🏛️ Steuer/Gebühr, 🛒 Einkaufen/Supermarkt, 👕 Kleidung, 💊 Apotheke, 🎟️ Eintrittskarte, 🍺 Bar/Alkohol, 🏨 Hotel
Datum: aus Text extrahieren wenn vorhanden, sonst heute ${new Date().toISOString().split('T')[0]}
NUR JSON Array zurückgeben.`,
        messages: [{ role: "user", content: text }]
      })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text || "[]").replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(raw);
    setState({ scanResults: parsed.map((e, i) => ({ ...e, id: i, selected: true })), scanStep: "confirm" });
  } catch {
    setState({ scanResults: [], scanStep: "confirm" });
  }
}

async function scanImageWithAI(base64, mimeType) {
  setState({ scanStep: "scanning", modal: "scan" });
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `Ausgaben-Parser für Bilder. Lies alle Ausgaben aus dem Bild. Gib NUR JSON zurück.
Format: [{"label":"Name","amount":12.50,"icon":"emoji","date":"YYYY-MM-DD"}]
Emoji: 🍽️ Restaurant, 🌯 Fast Food, ☕ Café, 🚗 Uber/Taxi, 🛴 Bolt, ✈️ Ticket/Reise, 🏛️ Steuer, 🛒 Einkaufen, 👕 Kleidung
Datum aus Bild wenn sichtbar, sonst ${new Date().toISOString().split('T')[0]}
NUR JSON zurückgeben.`,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: mimeType, data: base64 }},
          { type: "text", text: "Extrahiere alle Ausgaben aus diesem Bild als JSON." }
        ]}]
      })
    });
    const data = await res.json();
    const raw = (data.content?.[0]?.text || "[]").replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(raw);
    setState({ scanResults: parsed.map((e, i) => ({ ...e, id: i, selected: true })), scanStep: "confirm" });
  } catch {
    setState({ scanResults: [], scanStep: "confirm" });
  }
}

function confirmScan() {
  state.scanResults.filter(e => e.selected).forEach(e => {
    addExpense({ label: e.label, amount: e.amount, date: e.date, icon: e.icon || "💶", note: "" });
  });
  setState({ modal: null, scanStep: "input", scanText: "", scanResults: [] });
}

async function getAiTip() {
  setState({ aiLoading: true });
  const top = [...state.expenses].sort((a,b) => b.amount - a.amount).slice(0, 5);
  const weekTotal = state.expenses.filter(e => isThisWeek(e.date)).reduce((s,e) => s + e.amount, 0);
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "Du bist ein direkter Finanzberater. 2 Sätze auf Deutsch. Konkret und direkt. Keine Floskeln.",
        messages: [{ role: "user", content: `Wochenbudget: €${state.weekBudget}. Ausgegeben diese Woche: €${weekTotal.toFixed(0)}. Top Ausgaben: ${top.map(e => e.label + " €" + e.amount).join(", ")}. Spartipp?` }]
      })
    });
    const data = await res.json();
    setState({ aiMsg: data.content?.[0]?.text || "", aiLoading: false });
  } catch {
    setState({ aiMsg: "KI nicht verfügbar.", aiLoading: false });
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") e.className = v;
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const displayExp = getDisplayExp();
  const todayTotal = state.expenses.filter(e => isToday(e.date)).reduce((s,e) => s + e.amount, 0);
  const weekTotal = state.expenses.filter(e => isThisWeek(e.date)).reduce((s,e) => s + e.amount, 0);
  const weekPct = Math.min((weekTotal / state.weekBudget) * 100, 100);
  const weekRemaining = state.weekBudget - weekTotal;
  const ampel = weekPct < 60 ? "#4ADE80" : weekPct < 85 ? "#FB923C" : "#F87171";
  const ampelText = weekPct < 60 ? "✓ Gut im Budget" : weekPct < 85 ? "⚠ Aufpassen" : "⛔ Budget fast erreicht";

  // HEADER
  app.appendChild(el("div", { style: { background:"#111", padding:"16px 20px", borderBottom:"1px solid #222", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10 }},
    el("div", null,
      el("div", { style: { color:"#F5F5F5", fontWeight:700, fontSize:17 }}, "💶 Ausgaben"),
      el("div", { style: { color:"#666", fontSize:11, marginTop:2 }}, "Nur variable Kosten · " + (state.savedFlash ? "✓ Gespeichert" : new Date().toLocaleDateString("de-DE")))
    ),
    el("div", { style: { display:"flex", gap:8 }},
      el("button", {
        style: { background:"rgba(232,197,71,0.12)", border:"1px solid rgba(232,197,71,0.3)", borderRadius:8, padding:"8px 12px", color:"#E8C547", fontWeight:700, fontSize:12 },
        onClick: () => setState({ modal:"scan", scanStep:"input" })
      }, "📷 Scan"),
      el("button", {
        style: { background:"#E8C547", border:"none", borderRadius:8, padding:"8px 14px", color:"#0A0A0A", fontWeight:700, fontSize:12 },
        onClick: () => setState({ modal:"add", addForm:{ label:"", amount:"", date: new Date().toISOString().split("T")[0], icon:"🛒", note:"" }})
      }, "+ Neu")
    )
  ));

  // BUDGET CARD
  const budgetCard = el("div", { style: { background:"#111", margin:"12px 16px 0", borderRadius:12, padding:"16px", border:"1px solid #222" }},
    el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }},
      el("div", null,
        el("div", { style: { fontSize:10, color:"#666", letterSpacing:2, textTransform:"uppercase" }}, "Diese Woche"),
        el("div", { style: { display:"flex", alignItems:"baseline", gap:6, marginTop:4 }},
          el("span", { style: { fontSize:26, fontWeight:700, color:ampel }}, fmt(weekTotal)),
          el("span", { style: { fontSize:13, color:"#666" }}, "/ " + fmt(state.weekBudget))
        )
      ),
      el("div", { style: { textAlign:"right" }},
        el("div", { style: { fontSize:11, color:ampel, fontWeight:600 }}, ampelText),
        el("div", { style: { fontSize:12, color:"#666", marginTop:2 }}, weekRemaining >= 0 ? fmt(weekRemaining) + " übrig" : fmt(Math.abs(weekRemaining)) + " überzogen"),
        el("button", {
          style: { marginTop:6, background:"none", border:"1px solid #333", borderRadius:4, padding:"3px 8px", color:"#666", fontSize:10 },
          onClick: () => setState({ modal:"budget", budgetInput: String(state.weekBudget) })
        }, "✎ Budget")
      )
    ),
    el("div", { style: { background:"#222", borderRadius:4, height:8 }},
      el("div", { style: { width: weekPct + "%", background:ampel, borderRadius:4, height:8, transition:"width 0.5s, background 0.3s" }})
    ),
    el("div", { style: { display:"flex", justifyContent:"space-between", marginTop:10 }},
      el("span", { style: { fontSize:11, color:"#666" }}, "Heute"),
      el("span", { style: { fontSize:13, fontWeight:700, color:"#F5F5F5" }}, fmt(todayTotal))
    )
  );
  app.appendChild(budgetCard);

  // KI TIPP
  const kiCard = el("div", { style: { margin:"10px 16px 0", background:"#181818", borderRadius:10, padding:"12px 14px", border:"1px solid #222" }},
    el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: state.aiMsg ? 8 : 0 }},
      el("span", { style: { fontSize:11, color:"#E8C547", fontWeight:600, letterSpacing:1 }}, "⚡ KI SPARTIPP"),
      el("button", {
        style: { background:"rgba(232,197,71,0.12)", border:"1px solid rgba(232,197,71,0.2)", borderRadius:6, padding:"4px 10px", color:"#E8C547", fontSize:10, fontWeight:600 },
        onClick: getAiTip
      }, state.aiLoading ? "..." : "Analysieren")
    ),
    state.aiMsg
      ? el("div", { style: { fontSize:12, color:"#CCCCCC", lineHeight:1.6 }}, state.aiMsg)
      : el("div", { style: { fontSize:11, color:"#666" }}, "Klicke Analysieren für einen persönlichen Spartipp")
  );
  app.appendChild(kiCard);

  // TABS
  const tabBar = el("div", { style: { display:"flex", margin:"12px 16px 10px", background:"#111", borderRadius:8, padding:4 }});
  [{ id:"heute", label:"Heute" }, { id:"woche", label:"Diese Woche" }, { id:"alle", label:"Alle" }].forEach(t => {
    const active = state.tab === t.id;
    const btn = el("button", {
      style: { flex:1, padding:"8px 4px", borderRadius:6, border:"none", background: active ? "#E8C547" : "transparent", color: active ? "#0A0A0A" : "#666", fontSize:12, fontWeight: active ? 700 : 400 },
      onClick: () => setState({ tab: t.id })
    }, t.label);
    tabBar.appendChild(btn);
  });
  app.appendChild(tabBar);

  // EXPENSES LIST
  const list = el("div", { style: { padding:"0 16px 120px" }});

  if (displayExp.length === 0) {
    list.appendChild(el("div", { style: { textAlign:"center", padding:"50px 0", color:"#666" }},
      el("div", { style: { fontSize:40, marginBottom:12 }}, "✨"),
      el("div", { style: { fontSize:14 }}, "Keine Ausgaben"),
      el("div", { style: { fontSize:12, marginTop:4 }}, "Scan oder + Neu drücken")
    ));
  } else {
    // Group by date
    const grouped = {};
    displayExp.forEach(e => {
      const d = e.date;
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push(e);
    });

    Object.entries(grouped).sort(([a],[b]) => b.localeCompare(a)).forEach(([date, exps]) => {
      const dayTotal = exps.reduce((s,e) => s + e.amount, 0);
      const dateLabel = date === new Date().toISOString().split("T")[0] ? "Heute" :
                        date === "2026-03-26" ? "Gestern · Amsterdam + Geburtstag 💍" :
                        new Date(date).toLocaleDateString("de-DE", { weekday:"short", day:"numeric", month:"short" });

      list.appendChild(el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, marginTop:16 }},
        el("span", { style: { fontSize:11, color:"#666", letterSpacing:0.5 }}, dateLabel.toUpperCase()),
        el("span", { style: { fontSize:11, color:"#E8C547", fontWeight:600 }}, fmt(dayTotal))
      ));

      exps.forEach(e => {
        const row = el("div", { className:"slide-in", style: { background:"#111", border:"1px solid #222", borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", gap:12, marginBottom:6 }},
          el("div", { style: { fontSize:24, lineHeight:1, flexShrink:0 }}, e.icon || "💶"),
          el("div", { style: { flex:1, minWidth:0 }},
            el("div", { style: { color:"#F5F5F5", fontSize:14, fontWeight:500, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}, e.label),
            e.note ? el("div", { style: { fontSize:11, color:"#666", marginTop:2 }}, e.note) : null
          ),
          el("div", { style: { color:"#E8C547", fontWeight:700, fontSize:15, flexShrink:0 }}, fmt(e.amount)),
          el("button", {
            style: { background:"none", border:"none", color:"#444", fontSize:18, padding:"0 4px", flexShrink:0 },
            onClick: () => deleteExpense(e.id)
          }, "✕")
        );
        list.appendChild(row);
      });
    });

    // Total
    const total = displayExp.reduce((s,e) => s + e.amount, 0);
    list.appendChild(el("div", { style: { marginTop:12, padding:"12px 14px", background:"rgba(232,197,71,0.08)", border:"1px solid rgba(232,197,71,0.2)", borderRadius:10, display:"flex", justifyContent:"space-between" }},
      el("span", { style: { color:"#666", fontSize:12 }}, "GESAMT " + (state.tab === "heute" ? "HEUTE" : state.tab === "woche" ? "DIESE WOCHE" : "ALLE")),
      el("span", { style: { color:"#E8C547", fontWeight:700, fontSize:16 }}, fmt(total))
    ));
  }
  app.appendChild(list);

  // ── MODALS ──────────────────────────────────────────────────────────────────
  if (state.modal) {
    const overlay = el("div", { style: { position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }});
    const sheet = el("div", { style: { background:"#111", border:"1px solid #222", borderRadius:"16px 16px 0 0", padding:"24px 20px 40px", width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto" }});

    // SCAN MODAL
    if (state.modal === "scan") {
      if (state.scanStep === "input") {
        sheet.appendChild(el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }},
          el("div", { style: { color:"#F5F5F5", fontWeight:700, fontSize:15 }}, "📷 Ausgaben scannen"),
          el("button", { style: { background:"none", border:"none", color:"#666", fontSize:22 }, onClick: () => setState({ modal:null, scanStep:"input" }) }, "✕")
        ));

        // Upload
        const fileInput = el("input", { type:"file", accept:"image/*", style:{ display:"none" }});
        fileInput.addEventListener("change", e => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = ev => scanImageWithAI(ev.target.result.split(",")[1], file.type);
          reader.readAsDataURL(file);
        });

        const uploadBox = el("div", { style: { border:"2px dashed rgba(232,197,71,0.3)", borderRadius:12, padding:"24px", textAlign:"center", marginBottom:16, background:"rgba(232,197,71,0.05)" },
          onClick: () => fileInput.click()
        },
          el("div", { style: { fontSize:40, marginBottom:8 }}, "📷"),
          el("div", { style: { color:"#E8C547", fontWeight:600, fontSize:13 }}, "Foto hochladen"),
          el("div", { style: { color:"#666", fontSize:11, marginTop:4 }}, "Notiz · Kassenbon · Screenshot")
        );
        sheet.appendChild(uploadBox);
        sheet.appendChild(fileInput);

        sheet.appendChild(el("div", { style: { color:"#444", fontSize:11, textAlign:"center", marginBottom:12 }}, "— oder Text eingeben —"));

        const ta = el("textarea", { style: { width:"100%", background:"#181818", border:"1px solid #333", borderRadius:8, padding:"12px", color:"#F5F5F5", fontSize:13, outline:"none", resize:"none", height:90 }});
        ta.placeholder = "z.B. Amsterdam: Ticket 43, Essen 25, Uber 23\noder: Coffee 5, Restaurant 45, Taxi 15";
        ta.addEventListener("input", e => { state.scanText = e.target.value; });
        sheet.appendChild(ta);

        sheet.appendChild(el("div", { style: { display:"flex", gap:8, marginTop:12 }},
          el("button", { style: { flex:1, padding:12, borderRadius:8, border:"1px solid #333", background:"transparent", color:"#666", fontSize:13 }, onClick: () => setState({ modal:null }) }, "Abbrechen"),
          el("button", { style: { flex:2, padding:12, borderRadius:8, border:"none", background:"#E8C547", color:"#0A0A0A", fontWeight:700, fontSize:13 }, onClick: () => scanWithAI(state.scanText) }, "KI analysieren →")
        ));
      }

      if (state.scanStep === "scanning") {
        sheet.appendChild(el("div", { style: { textAlign:"center", padding:"40px 0" }},
          el("div", { style: { fontSize:48, marginBottom:16 }}, "🔍"),
          el("div", { style: { color:"#F5F5F5", fontSize:15, fontWeight:600, marginBottom:8 }}, "KI analysiert..."),
          el("div", { style: { color:"#666", fontSize:12 }}, "Ausgaben werden erkannt"),
          el("div", { style: { display:"flex", gap:8, justifyContent:"center", marginTop:20 }},
            ...[0,1,2].map(i => el("div", { style: { width:10, height:10, borderRadius:"50%", background:"#E8C547", animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite` }}))
          )
        ));
      }

      if (state.scanStep === "confirm") {
        sheet.appendChild(el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }},
          el("div", { style: { color:"#F5F5F5", fontWeight:700, fontSize:15 }}, "✓ Erkannte Ausgaben"),
          el("button", { style: { background:"none", border:"none", color:"#666", fontSize:22 }, onClick: () => setState({ modal:null, scanStep:"input" }) }, "✕")
        ));

        if (state.scanResults.length === 0) {
          sheet.appendChild(el("div", { style: { color:"#666", textAlign:"center", padding:"20px 0" }}, "Keine Ausgaben erkannt · Erneut versuchen"));
        } else {
          state.scanResults.forEach(e => {
            const row = el("div", {
              style: { background: e.selected ? "rgba(232,197,71,0.08)" : "#181818", border:`1px solid ${e.selected ? "rgba(232,197,71,0.3)" : "#222"}`, borderRadius:8, padding:"12px 14px", display:"flex", alignItems:"center", gap:10, marginBottom:6 },
              onClick: () => {
                state.scanResults = state.scanResults.map(x => x.id === e.id ? { ...x, selected: !x.selected } : x);
                render();
              }
            },
              el("div", { style: { fontSize:22 }}, e.icon || "💶"),
              el("div", { style: { flex:1 }},
                el("div", { style: { color:"#F5F5F5", fontSize:13, fontWeight:500 }}, e.label),
                el("div", { style: { color:"#666", fontSize:11, marginTop:2 }}, e.date)
              ),
              el("div", { style: { color:"#E8C547", fontWeight:700, fontSize:14 }}, fmt(e.amount)),
              el("div", { style: { color: e.selected ? "#4ADE80" : "#444", fontSize:18 }}, e.selected ? "✓" : "○")
            );
            sheet.appendChild(row);
          });
        }

        const selTotal = state.scanResults.filter(e => e.selected).reduce((s,e) => s + e.amount, 0);
        sheet.appendChild(el("div", { style: { borderTop:"1px solid #222", paddingTop:12, marginTop:4, display:"flex", justifyContent:"space-between", marginBottom:12 }},
          el("span", { style: { color:"#666", fontSize:12 }}, state.scanResults.filter(e => e.selected).length + " Ausgaben ausgewählt"),
          el("span", { style: { color:"#E8C547", fontWeight:700 }}, fmt(selTotal))
        ));

        sheet.appendChild(el("div", { style: { display:"flex", gap:8 }},
          el("button", { style: { flex:1, padding:12, borderRadius:8, border:"1px solid #333", background:"transparent", color:"#666", fontSize:13 }, onClick: () => setState({ scanStep:"input" }) }, "← Zurück"),
          el("button", { style: { flex:2, padding:12, borderRadius:8, border:"none", background:"#4ADE80", color:"#0A0A0A", fontWeight:700, fontSize:13 }, onClick: confirmScan }, "Alle übernehmen ✓")
        ));
      }
    }

    // ADD MODAL
    if (state.modal === "add") {
      sheet.appendChild(el("div", { style: { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }},
        el("div", { style: { color:"#F5F5F5", fontWeight:700, fontSize:15 }}, "Ausgabe hinzufügen"),
        el("button", { style: { background:"none", border:"none", color:"#666", fontSize:22 }, onClick: () => setState({ modal:null }) }, "✕")
      ));

      // Icon picker
      const iconGrid = el("div", { style: { display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }});
      ICONS.forEach(ic => {
        const btn = el("button", {
          style: { width:38, height:38, borderRadius:8, border:`1px solid ${state.addForm.icon === ic ? "#E8C547" : "#333"}`, background: state.addForm.icon === ic ? "rgba(232,197,71,0.12)" : "#181818", fontSize:18 },
          onClick: () => setState({ addForm: { ...state.addForm, icon: ic }})
        }, ic);
        iconGrid.appendChild(btn);
      });
      sheet.appendChild(iconGrid);

      [
        { key:"label", placeholder:"Bezeichnung", type:"text" },
        { key:"amount", placeholder:"Betrag (€)", type:"number" },
        { key:"date", placeholder:"Datum", type:"date" },
        { key:"note", placeholder:"Notiz (optional)", type:"text" },
      ].forEach(f => {
        const inp = el("input", { type:f.type, style: { width:"100%", background:"#181818", border:"1px solid #333", borderRadius:8, padding:"11px 12px", color:"#F5F5F5", fontSize:13, marginBottom:8, outline:"none" }});
        inp.placeholder = f.placeholder;
        inp.value = state.addForm[f.key];
        inp.addEventListener("input", e => { state.addForm = { ...state.addForm, [f.key]: e.target.value }; });
        sheet.appendChild(inp);
      });

      sheet.appendChild(el("div", { style: { display:"flex", gap:8, marginTop:8 }},
        el("button", { style: { flex:1, padding:12, borderRadius:8, border:"1px solid #333", background:"transparent", color:"#666", fontSize:13 }, onClick: () => setState({ modal:null }) }, "Abbrechen"),
        el("button", { style: { flex:1, padding:12, borderRadius:8, border:"none", background:"#E8C547", color:"#0A0A0A", fontWeight:700, fontSize:13 }, onClick: () => {
          if (!state.addForm.label || !state.addForm.amount) return;
          addExpense({ ...state.addForm, amount: parseFloat(state.addForm.amount) });
          setState({ modal:null });
        }}, "Speichern ✓")
      ));
    }

    // BUDGET MODAL
    if (state.modal === "budget") {
      sheet.appendChild(el("div", { style: { color:"#F5F5F5", fontWeight:700, fontSize:15, marginBottom:6 }}, "Wochenbudget"));
      sheet.appendChild(el("div", { style: { color:"#666", fontSize:12, marginBottom:16 }}, "Nur für variable Ausgaben · Fixkosten ausgenommen"));

      const inp = el("input", { type:"number", style: { width:"100%", background:"#181818", border:"1px solid #E8C547", borderRadius:10, padding:"16px", color:"#E8C547", fontSize:28, fontWeight:700, outline:"none", textAlign:"center" }});
      inp.value = state.budgetInput;
      inp.addEventListener("input", e => { state.budgetInput = e.target.value; });
      sheet.appendChild(inp);

      const presets = [200, 300, 400, 500];
      const presetRow = el("div", { style: { display:"flex", gap:8, marginTop:12, marginBottom:16 }});
      presets.forEach(p => {
        presetRow.appendChild(el("button", {
          style: { flex:1, padding:"8px", borderRadius:6, border:`1px solid ${state.weekBudget === p ? "#E8C547" : "#333"}`, background: state.weekBudget === p ? "rgba(232,197,71,0.12)" : "transparent", color: state.weekBudget === p ? "#E8C547" : "#666", fontSize:12 },
          onClick: () => { state.budgetInput = String(p); render(); }
        }, "€" + p));
      });
      sheet.appendChild(presetRow);

      sheet.appendChild(el("div", { style: { display:"flex", gap:8 }},
        el("button", { style: { flex:1, padding:12, borderRadius:8, border:"1px solid #333", background:"transparent", color:"#666", fontSize:13 }, onClick: () => setState({ modal:null }) }, "Abbrechen"),
        el("button", { style: { flex:1, padding:12, borderRadius:8, border:"none", background:"#E8C547", color:"#0A0A0A", fontWeight:700, fontSize:13 }, onClick: () => {
          saveData("lf-budget-v2", parseFloat(state.budgetInput) || 400);
          setState({ modal:null, weekBudget: parseFloat(state.budgetInput) || 400 });
        }}, "Speichern")
      ));
    }

    overlay.appendChild(sheet);
    overlay.addEventListener("click", e => { if (e.target === overlay) setState({ modal:null, scanStep:"input" }); });
    app.appendChild(overlay);
  }
}

render();
</script>
