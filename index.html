// Storage
var db = {
get: function(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}},
set: function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};

// State
var S = {
exp: db.get(“koin5-exp”, SEED),
wb:  db.get(“koin5-wb”, 400),
mb:  db.get(“koin5-mb”, 1500),
tab: “home”,
modal: null,
scanStep: “input”,
scanText: “”,
scanRes: [],
form: {label:””,amount:””,date:today(),icon:“cart”,note:””},
aiTip: “”, aiTipL: false,
fcAi: “”,  fcAiL: false,

function setState(patch){
for(var k in patch) S[k] = patch[k];
render();
}

function saveExp(){
db.set(“koin5-exp”, S.exp);
setState({flash:true});
setTimeout(function(){setState({flash:false});}, 1000);
}

function today(){return new Date().toISOString().split(“T”)[0];}
function fmt(n){return “\u20AC\u202f” + Number(n).toLocaleString(“de-DE”,{minimumFractionDigits:0,maximumFractionDigits:2});}

function isToday(d){return new Date(d).toDateString()===new Date().toDateString();}
function isWeek(d){
var now=new Date(),date=new Date(d),day=now.getDay()||7;
var mon=new Date(now);mon.setDate(now.getDate()-day+1);mon.setHours(0,0,0,0);
var sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
return date>=mon&&date<=sun;
}
function isMonth(d){var now=new Date(),date=new Date(d);return date.getMonth()===now.getMonth()&&date.getFullYear()===now.getFullYear();}

function calcFc(){
var now=new Date(),dom=now.getDate(),dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
var ms=S.exp.filter(function(e){return isMonth(e.date);}).reduce(function(s,e){return s+e.amount;},0);
var dr=dom>0?ms/dom:0,fore=dr*dim,diff=fore-S.mb,dl=dim-dom,bl=S.mb-ms;
return{ms:ms,fore:fore,diff:diff,dom:dom,dim:dim,dl:dl,bl:bl,dr:dr,dleft:dl>0?bl/dl:0};
}

// AI
async function callAI(system, msg){
var res = await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:400,system:system,messages:[{role:“user”,content:msg}]})
});
var d = await res.json();
return (d.content && d.content[0]) ? d.content[0].text : “”;
}

async function getTip(){
setState({aiTipL:true});
var ws=S.exp.filter(function(e){return isWeek(e.date);}).reduce(function(s,e){return s+e.amount;},0);
var top=[].concat(S.exp).sort(function(a,b){return b.amount-a.amount;}).slice(0,3);
try{
var t=await callAI(“Finanzberater. 2 Saetze Deutsch. Direkt. Konkret.”,“Budget E”+S.wb+”. Ausgaben E”+Math.round(ws)+”. Top: “+top.map(function(e){return e.label+” E”+e.amount;}).join(”, “)+”.”);
setState({aiTip:t,aiTipL:false});
}catch(err){setState({aiTip:“KI nicht verfuegbar.”,aiTipL:false});}
}

async function getFcAi(){
setState({fcAiL:true});
var f=calcFc();
try{
var t=await callAI(“Finanzberater. 2 Saetze Deutsch. Klar.”,“Tag “+f.dom+”/”+f.dim+”. Ausgegeben E”+Math.round(f.ms)+”. Budget E”+S.mb+”. Prognose E”+Math.round(f.fore)+”.”);
setState({fcAi:t,fcAiL:false});
}catch(err){setState({fcAi:“KI nicht verfuegbar.”,fcAiL:false});}
}

async function doScan(text, isImg, b64, mime){
setState({scanStep:“scanning”});
var sys = ‘NUR JSON Array. Format: [{“label”:“Name”,“amount”:12.5,“icon”:“ICONKEY”,“date”:“YYYY-MM-DD”}]. ICONKEY muss einer dieser sein: cart food coffee car plane fun shirt pill phone gift sport beer hotel fuel cinema book gym music wrap cake scooter ticket tax shoe scissors nail cash beauty barber. Datum aus Input wenn vorhanden, sonst ‘+today()+’.’;
try{
var msgs;
if(isImg){
msgs=[{role:“user”,content:[{type:“image”,source:{type:“base64”,media_type:mime,data:b64}},{type:“text”,text:“JSON bitte.”}]}];
} else {
msgs=[{role:“user”,content:text}];
}
var res=await fetch(“https://api.anthropic.com/v1/messages”,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:600,system:sys,messages:msgs})});
var d=await res.json();
var raw=((d.content&&d.content[0])?d.content[0].text:”[]”).replace(/`json|`/g,””).trim();
var parsed=JSON.parse(raw);
setState({scanRes:parsed.map(function(e,i){return Object.assign({},e,{id:i,sel:true});})  ,scanStep:“confirm”});
}catch(err){setState({scanRes:[],scanStep:“confirm”});}
}

// DOM helpers
function el(tag, props, kids){
var node = document.createElement(tag);
if(props){
Object.keys(props).forEach(function(k){
var v = props[k];
if(k === “style”) Object.assign(node.style, v);
else if(k === “cls”) node.className = v;
else if(k.indexOf(“on”) === 0) node.addEventListener(k.slice(2).toLowerCase(), v);
else node.setAttribute(k, v);
});
}
if(kids){
(Array.isArray(kids)?kids:[kids]).forEach(function(c){
if(c == null) return;
if(typeof c === “string”) node.appendChild(document.createTextNode(c));
else node.appendChild(c);
});
}
return node;
}
function div(style, kids, extra){
var props = {style: style};
if(extra) Object.assign(props, extra);
return el(“div”, props, kids);
}
function txt(t, style){return el(“span”,{style:style},[t]);}
function btn(label, style, onclick, kids){
var b = el(“button”,{style:style,onClick:onclick}, kids || (typeof label === “string” ? [label] : null));
return b;
}
function inp(type, val, style, onchange, placeholder){
var i = el(“input”,{type:type,style:style});
i.value = val || “”;
if(placeholder) i.placeholder = placeholder;
i.addEventListener(“input”, onchange);
return i;
}

function progressBar(pct, color){
return div({background:C.s2,borderRadius:“100px”,height:“5px”,overflow:“hidden”},[
div({width:Math.min(pct,100)+”%”,height:“100%”,background:color,borderRadius:“100px”,transition:“width .8s cubic-bezier(.16,1,.3,1)”})

}

function statusColor(pct){
return pct < 60 ? C.green : pct < 85 ? C.orange : C.red;
}

node.appendChild(iconBox); node.appendChild(info); node.appendChild(amount); node.appendChild(delBtn);

}
