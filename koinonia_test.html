<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test</title>
<style>
body{background:#000;color:#fff;font-family:-apple-system,sans-serif;padding:40px 20px}
button{background:#2563EB;color:#fff;border:none;border-radius:12px;padding:16px 32px;font-size:18px;font-weight:700;width:100%;margin-top:20px}
#result{margin-top:20px;font-size:16px;color:#10B981;text-align:center}
</style>
</head>
<body>
<h1 style="font-size:24px;font-weight:800">Koinonia Test</h1>
<p style="color:rgba(255,255,255,.5);margin-top:8px">Tippe den Button</p>
<button id="testBtn">+ Ausgabe</button>
<div id="result"></div>
<script>
document.getElementById('testBtn').addEventListener('click', function() {
  document.getElementById('result').textContent = 'JS funktioniert! ' + new Date().toLocaleTimeString();
});
</script>
</body>
</html>
